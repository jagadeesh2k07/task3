<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body class="login-page">

  <canvas id="particleCanvas"></canvas>

  <div class="page-wrap">
    <div class="card" id="card">
      <div class="card-blob"></div>

      <div class="card-header">
        <div class="avatar-ring">
          <div class="avatar-inner">
            <i class="fas fa-user"></i>
          </div>
        </div>
        <h1 class="card-title">Welcome back</h1>
        <p class="card-sub">Sign in to continue</p>
      </div>

      <form id="loginForm" novalidate>

        <div class="field anim-field" id="grp-email" style="--i:0">
          <label for="email">Email</label>
          <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
          </div>
          <span class="err" id="err-email"></span>
        </div>

        <div class="field anim-field" id="grp-pass" style="--i:1">
          <label for="password">
            Password
            <a href="#" class="forgot" id="forgotLink">Forgot password?</a>
          </label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="eye-btn" onclick="toggleEye('password','eye1')">
              <i class="fas fa-eye" id="eye1"></i>
            </button>
          </div>
          <span class="err" id="err-pass"></span>
        </div>

        <label class="check-label anim-field" style="--i:2">
          <input type="checkbox" id="remember"/>
          <span class="check-box"></span>
          Keep me signed in
        </label>

        <div class="anim-field" style="--i:3">
          <button type="submit" class="btn-main" id="loginBtn">
            <span id="loginTxt">Sign In</span>
            <span id="loginLoad" class="spin hidden"><i class="fas fa-circle-notch fa-spin"></i></span>
          </button>
        </div>

      </form>

      <div class="toast hidden" id="toast"></div>
      <p class="switch anim-field" style="--i:4">No account? <a href="register.html">Create one</a></p>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay hidden" id="fpOverlay">
    <div class="modal-card" id="fpCard">
      <button class="modal-close" id="fpClose"><i class="fas fa-times"></i></button>
      <div class="modal-header">
        <div class="modal-icon"><i class="fas fa-key"></i></div>
        <h2 class="modal-title">Reset Password</h2>
        <p class="modal-sub">Verify your identity to set a new password</p>
      </div>

      <!-- Step 1: Email -->
      <div class="fp-step" id="fpStep1">
        <div class="step-dots">
          <span class="dot active"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <div class="field" id="grp-fpemail">
          <label for="fpEmail">Your email address</label>
          <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input type="email" id="fpEmail" placeholder="you@example.com"/>
          </div>
          <span class="err" id="err-fpemail"></span>
        </div>
        <button class="btn-main" id="fpStep1Btn" onclick="fpNext1()">
          <span id="fpStep1Txt">Continue</span>
          <span id="fpStep1Load" class="spin hidden"><i class="fas fa-circle-notch fa-spin"></i></span>
        </button>
      </div>

      <!-- Step 2: Current Password -->
      <div class="fp-step hidden" id="fpStep2">
        <div class="step-dots">
          <span class="dot done"></span><span class="dot active"></span><span class="dot"></span>
        </div>
        <div class="field" id="grp-fpcurr">
          <label for="fpCurr">Current password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" id="fpCurr" placeholder="Enter current password"/>
            <button type="button" class="eye-btn" onclick="toggleEye('fpCurr','fpEye1')">
              <i class="fas fa-eye" id="fpEye1"></i>
            </button>
          </div>
          <span class="err" id="err-fpcurr"></span>
        </div>
        <button class="btn-main" id="fpStep2Btn" onclick="fpNext2()">
          <span id="fpStep2Txt">Verify Password</span>
          <span id="fpStep2Load" class="spin hidden"><i class="fas fa-circle-notch fa-spin"></i></span>
        </button>
      </div>

      <!-- Step 3: New Password -->
      <div class="fp-step hidden" id="fpStep3">
        <div class="step-dots">
          <span class="dot done"></span><span class="dot done"></span><span class="dot active"></span>
        </div>
        <div class="field" id="grp-fpnew">
          <label for="fpNew">New password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" id="fpNew" placeholder="Min 8 characters"/>
            <button type="button" class="eye-btn" onclick="toggleEye('fpNew','fpEye2')">
              <i class="fas fa-eye" id="fpEye2"></i>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="fp-str-fill"></div></div>
          <span class="strength-txt" id="fp-str-txt"></span>
          <span class="err" id="err-fpnew"></span>
        </div>
        <div class="field" id="grp-fpconf">
          <label for="fpConf">Confirm new password</label>
          <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" id="fpConf" placeholder="Re-enter new password"/>
            <button type="button" class="eye-btn" onclick="toggleEye('fpConf','fpEye3')">
              <i class="fas fa-eye" id="fpEye3"></i>
            </button>
          </div>
          <span class="err" id="err-fpconf"></span>
          <span class="match-ok hidden" id="fp-match-ok"><i class="fas fa-check-circle"></i> Passwords match</span>
        </div>
        <button class="btn-main" id="fpStep3Btn" onclick="fpSubmit()">
          <span id="fpStep3Txt">Update Password</span>
          <span id="fpStep3Load" class="spin hidden"><i class="fas fa-circle-notch fa-spin"></i></span>
        </button>
      </div>

      <div class="toast hidden" id="fp-toast"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
